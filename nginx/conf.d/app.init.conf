# -----------------------------
# HTTP only — used during initial SSL cert setup
# After running init-ssl.sh, this file is removed
# and app.conf takes over
# -----------------------------
server {
    listen 80;
    server_name project.megapixel.sg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
